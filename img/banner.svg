<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3ecfcf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9c74f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c63ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#3ecfcf;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3ecfcf;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#f9c74f;stop-opacity:0.4" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="12"/>

  <!-- Decorative grid dots -->
  <g opacity="0.07">
    <circle cx="50" cy="50" r="2" fill="white"/>
    <circle cx="100" cy="50" r="2" fill="white"/>
    <circle cx="150" cy="50" r="2" fill="white"/>
    <circle cx="200" cy="50" r="2" fill="white"/>
    <circle cx="50" cy="100" r="2" fill="white"/>
    <circle cx="100" cy="100" r="2" fill="white"/>
    <circle cx="150" cy="100" r="2" fill="white"/>
    <circle cx="200" cy="100" r="2" fill="white"/>
    <circle cx="1050" cy="300" r="2" fill="white"/>
    <circle cx="1100" cy="300" r="2" fill="white"/>
    <circle cx="1150" cy="300" r="2" fill="white"/>
    <circle cx="1050" cy="350" r="2" fill="white"/>
    <circle cx="1100" cy="350" r="2" fill="white"/>
    <circle cx="1150" cy="350" r="2" fill="white"/>
  </g>

  <!-- Audio waveform visualization (decorative) -->
  <!-- Left waveform -->
  <g transform="translate(60, 200)" opacity="0.5">
    <rect x="0"   y="-10" width="6" height="20"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="12"  y="-25" width="6" height="50"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="24"  y="-45" width="6" height="90"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="36"  y="-30" width="6" height="60"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="48"  y="-55" width="6" height="110" rx="3" fill="url(#waveGrad1)"/>
    <rect x="60"  y="-35" width="6" height="70"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="72"  y="-15" width="6" height="30"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="84"  y="-40" width="6" height="80"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="96"  y="-20" width="6" height="40"  rx="3" fill="url(#waveGrad1)"/>
    <rect x="108" y="-8"  width="6" height="16"  rx="3" fill="url(#waveGrad1)"/>
  </g>

  <!-- Right waveform -->
  <g transform="translate(1010, 200)" opacity="0.5">
    <rect x="0"   y="-8"  width="6" height="16"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="12"  y="-20" width="6" height="40"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="24"  y="-40" width="6" height="80"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="36"  y="-55" width="6" height="110" rx="3" fill="url(#waveGrad2)"/>
    <rect x="48"  y="-35" width="6" height="70"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="60"  y="-45" width="6" height="90"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="72"  y="-25" width="6" height="50"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="84"  y="-30" width="6" height="60"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="96"  y="-12" width="6" height="24"  rx="3" fill="url(#waveGrad2)"/>
    <rect x="108" y="-5"  width="6" height="10"  rx="3" fill="url(#waveGrad2)"/>
  </g>

  <!-- Accent top bar -->
  <rect x="0" y="0" width="1200" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(530, 100)" filter="url(#glow)">
    <polygon points="20,0 8,22 16,22 8,44 28,16 18,16 28,0" fill="#f9c74f" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="600" y="190" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="64" font-weight="900" fill="white" letter-spacing="-1">
    Supertonic
    <tspan fill="url(#accentGrad)">Express</tspan>
  </text>

  <!-- Accent underline -->
  <rect x="340" y="202" width="520" height="3" rx="2" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Tagline -->
  <text x="600" y="250" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#a0aec0" letter-spacing="1">
    ⚡ Lightning-Fast · On-Device · OpenAI-Compatible TTS
  </text>

  <!-- Feature pills -->
  <!-- Python -->
  <rect x="230" y="290" width="120" height="34" rx="17" fill="#3d3d5c" stroke="#6c63ff" stroke-width="1.5"/>
  <text x="290" y="312" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#a78bfa">🐍 Python</text>

  <!-- JavaScript -->
  <rect x="370" y="290" width="150" height="34" rx="17" fill="#3d3d5c" stroke="#3ecfcf" stroke-width="1.5"/>
  <text x="445" y="312" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#67e8f9">⚡ JavaScript</text>

  <!-- FastAPI -->
  <rect x="540" y="290" width="130" height="34" rx="17" fill="#3d3d5c" stroke="#3ecfcf" stroke-width="1.5"/>
  <text x="605" y="312" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#6ee7b7">🚀 FastAPI</text>

  <!-- Docker -->
  <rect x="690" y="290" width="120" height="34" rx="17" fill="#3d3d5c" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="750" y="312" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#93c5fd">🐳 Docker</text>

  <!-- OpenAI Compat -->
  <rect x="830" y="290" width="170" height="34" rx="17" fill="#3d3d5c" stroke="#f9c74f" stroke-width="1.5"/>
  <text x="915" y="312" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#fde68a">🔗 OpenAI Compat</text>

  <!-- RTF badge -->
  <g transform="translate(530, 340)">
    <text x="70" y="20" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#6b7280">
      Up to <tspan font-weight="bold" fill="#f9c74f">167× faster</tspan> than real-time · <tspan font-weight="bold" fill="#3ecfcf">66M</tspan> parameters · <tspan font-weight="bold" fill="#a78bfa">5 languages</tspan>
    </text>
  </g>
</svg>
